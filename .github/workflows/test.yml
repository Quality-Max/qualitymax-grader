name: Grade Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Grade example tests (expect mixed results)
        run: node bin/qualitymax-grader.js examples/good-test.spec.ts --min-grade A --verbose

      - name: JSON output for CI
        if: always()
        run: node bin/qualitymax-grader.js examples/*.spec.ts --json --min-grade F || true
